<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>멍 — 소셜 목업</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #fdf6ec 0%, #fce8d3 60%, #f5d5b8 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 40px 20px;
    }

    /* VERSION TABS */
    .ver-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .ver-tab {
      padding: 10px 20px; border-radius: 20px;
      border: 2px solid #c8945a; background: transparent;
      color: #c8945a; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .ver-tab.active { background: #c8945a; color: white; }
    .ver-desc { font-size: 13px; color: #a07850; margin-bottom: 20px; opacity: 0.8; text-align: center; }

    /* PHONE */
    .phone-wrap {
      position: relative; width: 310px;
      border-radius: 52px;
      box-shadow: 0 0 0 11px #1c1c1e, 0 0 0 13px #3a3a3c,
                  0 40px 100px rgba(0,0,0,.35), 0 10px 30px rgba(0,0,0,.2);
      overflow: hidden; background: #fdf6ec;
    }
    .phone-wrap::before {
      content: ""; position: absolute; top: 12px; left: 50%;
      transform: translateX(-50%); width: 115px; height: 33px;
      background: #1c1c1e; border-radius: 20px; z-index: 30; pointer-events: none;
    }

    /* MAIN SCREEN */
    .main-screen { position: relative; width: 100%; }
    .main-screen img { width: 100%; display: block; }

    /* ORIGINAL BUTTON OVERLAYS */
    .btn-overlay {
      position: absolute; cursor: pointer; border-radius: 14px;
      transition: background .12s; z-index: 5;
    }
    .btn-overlay:hover  { background: rgba(255,255,255,.22); }
    .btn-overlay:active { background: rgba(255,255,255,.38); }
    .btn-name   { left: 4%;  width: 44%; top: 77.5%; height: 7.2%; }
    .btn-myname { left: 52%; width: 44%; top: 77.5%; height: 7.2%; }
    .btn-talk   { left: 4%;  width: 44%; top: 86%;   height: 7.2%; }
    .btn-drink  { left: 52%; width: 44%; top: 86%;   height: 7.2%; }

    /* FRIEND ICON — white circle, same size/style as calendar & gear icons */
    .friend-icon-overlay {
      position: absolute;
      left: 58.3%;  /* measured: center at 63.8%, gap to calendar matches cal↔gear gap */
      top: 8.1%;    /* measured: circle top edge */
      width: 11.1%; /* measured: same as calendar circle width */
      height: 5.1%; /* measured: same as calendar circle height */
      z-index: 10; cursor: pointer;
      border-radius: 50%;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .friend-icon-overlay:hover  { transform: scale(1.08); box-shadow: 0 4px 14px rgba(0,0,0,0.13); }
    .friend-icon-overlay:active { transform: scale(0.92); }
    .notif-dot {
      position: absolute; top: -2px; right: -2px;
      width: 8px; height: 8px; background: #ef4444;
      border-radius: 50%; border: 1.5px solid #fff;
      display: none;
    }
    .notif-dot.active { display: block; }

    /* GEAR ICON — white circle overlay on top of main.png gear */
    .gear-icon-overlay {
      position: absolute;
      left: 80%; top: 8.1%;
      width: 11.1%; height: 5.1%;
      z-index: 10; cursor: pointer;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .gear-icon-overlay:hover  { background: rgba(255,255,255,.3); transform: scale(1.08); }
    .gear-icon-overlay:active { transform: scale(0.92); }

    /* ── SETTING SCREEN ──────────────────────────────────── */
    .setting-screen {
      position: absolute; inset: 0; background: #fff;
      z-index: 25; display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform .35s cubic-bezier(.4,0,.2,1); overflow: hidden;
    }
    .setting-screen.open { transform: translateX(0); }
    .setting-statusbar {
      background: #fff; padding: 14px 18px 4px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; font-weight: 700; color: #333; flex-shrink: 0;
    }
    .setting-navbar {
      display: flex; align-items: center;
      padding: 8px 14px 14px; flex-shrink: 0;
      position: relative;
    }
    .setting-back {
      background: none; border: none; font-size: 22px;
      cursor: pointer; color: #333; line-height: 1; padding: 2px 4px;
    }
    .setting-title {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-size: 17px; font-weight: 700; color: #111;
    }
    .setting-list { flex: 1; overflow-y: auto; }
    .setting-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 15px; color: #111; cursor: default;
    }
    .setting-item-value { font-size: 15px; color: #888; }
    .setting-item.editable { cursor: pointer; }
    .setting-item.editable:hover { background: #f9f9f9; }
    .setting-item.editable:active { background: #f0f0f0; }

    /* ── B MODE: SLIDE PANEL ─────────────────────────────── */
    .panel-backdrop {
      position: absolute; inset: 0; background: rgba(0,0,0,0);
      z-index: 19; pointer-events: none; transition: background .3s;
    }
    .panel-backdrop.open { background: rgba(0,0,0,.4); pointer-events: auto; }

    .friend-panel {
      position: absolute; top: 0; right: -62%; width: 62%; height: 100%;
      background: #fffdf9; z-index: 20; display: flex; flex-direction: column;
      transition: right .32s cubic-bezier(.4,0,.2,1); overflow: hidden;
    }
    .friend-panel.open { right: 0; }

    .panel-header {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 12px 10px; background: #fffdf9;
      border-bottom: 1px solid #f0e8d8; flex-shrink: 0; margin-top: 50px;
    }
    .panel-back {
      background: none; border: none; font-size: 19px;
      cursor: pointer; color: #4CAF50; padding: 2px 4px;
    }
    .panel-title { font-size: 15px; font-weight: 700; color: #333; flex: 1; }
    .panel-content { flex: 1; overflow-y: auto; }
    .header-add-btn {
      background: none; border: 1.5px solid #4CAF50; border-radius: 10px;
      color: #4CAF50; font-size: 12px; font-weight: 700;
      padding: 4px 10px; cursor: pointer; flex-shrink: 0;
    }
    .header-add-btn:active { background: #f0fdf4; }

    /* ── C MODE: FULL SCREEN ─────────────────────────────── */
    .friend-screen {
      position: absolute; inset: 0; background: #fdf6ec;
      z-index: 25; display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform .35s cubic-bezier(.4,0,.2,1); overflow: hidden;
    }
    .friend-screen.open { transform: translateX(0); }

    .fs-statusbar {
      background: #fdf6ec; padding: 14px 18px 4px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; font-weight: 700; color: #333; flex-shrink: 0;
    }
    .fs-navbar {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 14px 12px; border-bottom: 1px solid #eee; flex-shrink: 0;
    }
    .fs-back {
      background: none; border: none; font-size: 26px;
      cursor: pointer; color: #4CAF50; line-height: 1;
    }
    .fs-title { font-size: 18px; font-weight: 700; color: #333; }
    .fs-content { flex: 1; overflow-y: auto; padding-bottom: 20px; }

    /* ── SHARED: FRIEND LIST ─────────────────────────────── */
    .section-label {
      font-size: 10px; font-weight: 700; color: #b08050;
      text-transform: uppercase; letter-spacing: .5px;
      padding: 12px 14px 6px;
    }
    .request-item {
      display: flex; align-items: center; padding: 9px 12px;
      background: #fff9f0; border-bottom: 1px solid #f5ece0; gap: 8px;
    }
    .req-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg,#a5d6a7,#66bb6a);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .req-info { flex: 1; min-width: 0; }
    .req-name { font-size: 12px; font-weight: 600; color: #333; }
    .req-code { font-size: 10px; color: #bbb; }
    .req-btn {
      border: none; border-radius: 8px; padding: 5px 8px;
      font-size: 10px; font-weight: 700; cursor: pointer; transition: opacity .15s;
    }
    .req-btn:hover { opacity: .8; }
    .req-btn.accept { background: #4CAF50; color: #fff; }
    .req-btn.reject { background: #f0f0f0; color: #666; }

    .friend-item {
      display: flex; align-items: center; padding: 10px 12px;
      border-bottom: 1px solid #f5ece0; gap: 8px;
    }
    .friend-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg,#ffe0b2,#ffb74d);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }
    .friend-info { flex: 1; }
    .friend-name { font-size: 13px; font-weight: 600; color: #333; }
    .friend-detail { font-size: 10px; color: #999; }
    .add-friend-btn {
      margin: 14px 12px; width: calc(100% - 24px);
      padding: 12px; background: #4CAF50; color: #fff;
      border: none; border-radius: 14px; font-size: 13px;
      font-weight: 700; cursor: pointer; transition: background .15s;
    }
    .add-friend-btn:hover { background: #43a047; }

    .cheer-item {
      display: flex; align-items: center; padding: 10px 12px;
      border-bottom: 1px solid #f5ece0; gap: 8px; background: #fffbf0;
    }
    .cheer-info { flex: 1; }
    .cheer-name { font-size: 13px; font-weight: 600; color: #333; }
    .cheer-sub { font-size: 10px; color: #f59e0b; }
    .cheer-btn {
      font-size: 11px; font-weight: 700; color: #fff;
      background: #f59e0b; border: none; border-radius: 8px;
      padding: 5px 10px; cursor: pointer; flex-shrink: 0;
    }
    .cheered-badge { font-size: 10px; color: #4CAF50; font-weight: 600; flex-shrink: 0; }
    .my-cheer-item {
      padding: 10px 12px; border-bottom: 1px solid #d1fae5;
      background: #f0fdf4; display: flex; flex-direction: column; gap: 6px;
    }
    .my-cheer-top { display: flex; align-items: center; gap: 8px; }
    .my-cheer-info { flex: 1; }
    .my-cheer-name { font-size: 13px; font-weight: 600; color: #333; }
    .my-cheer-sub { font-size: 10px; color: #4CAF50; }
    .my-cheer-msg {
      font-size: 12px; color: #444; padding: 7px 10px;
      background: #fff; border-radius: 8px; border-left: 3px solid #4CAF50;
      line-height: 1.4;
    }
    .heart-btn {
      background: #fff; border: 1.5px solid #f43f5e;
      border-radius: 50%; width: 34px; height: 34px; flex-shrink: 0;
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .2s; color: #f43f5e;
    }
    .heart-btn:hover { background: #fff1f2; transform: scale(1.12); }
    .heart-btn.hearted {
      background: #f43f5e; color: #fff;
      animation: heartPop .35s ease;
    }
    .heart-btn.hearted-static { background: #f43f5e; color: #fff; }
    .my-cheer-done { background: #fafafa; }
    .my-cheer-done .my-cheer-msg { color: #bbb; border-left-color: #e0e0e0; }
    .sent-cheer-item {
      display: flex; align-items: center; padding: 10px 12px;
      border-bottom: 1px solid #f5ece0; gap: 8px;
    }
    .sent-cheer-info { flex: 1; }
    .sent-cheer-name { font-size: 13px; font-weight: 600; color: #333; }
    .sent-cheer-sub { font-size: 10px; color: #999; }
    .heart-back { font-size: 16px; }
    .heart-waiting { font-size: 13px; color: #ccc; letter-spacing: 2px; }
    .clean-badge { font-size: 15px; flex-shrink: 0; }
    .praise-btn {
      font-size: 11px; font-weight: 700; color: #fff;
      background: #4CAF50; border: none; border-radius: 8px;
      padding: 5px 10px; cursor: pointer; flex-shrink: 0;
    }
    .praise-btn:active { background: #43a047; }
    .nudge-btn {
      font-size: 11px; font-weight: 600; color: #999;
      background: none; border: 1.5px solid #ddd; border-radius: 8px;
      padding: 5px 10px; cursor: pointer; flex-shrink: 0;
    }
    .nudge-btn:active { background: #f5f5f5; }
    .nudge-sent { font-size: 10px; color: #bbb; font-weight: 600; flex-shrink: 0; }
    .my-cheer-dismiss {
      font-size: 11px; font-weight: 600; color: #aaa;
      background: none; border: 1px solid #e0e0e0;
      border-radius: 8px; padding: 4px 10px; cursor: pointer;
      flex-shrink: 0; margin-left: 4px;
    }
    @keyframes heartPop {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.45); }
      100% { transform: scale(1); }
    }
    .cheer-chip {
      background: #f9f9f9; border: 1.5px solid #e0e0e0; border-radius: 12px;
      padding: 10px 14px; font-size: 12px; color: #555;
      cursor: pointer; text-align: left; transition: all .15s;
    }
    .cheer-chip.selected {
      background: #f0fdf4; border-color: #4CAF50; color: #2e7d32; font-weight: 600;
    }

    /* ── GLOBAL MODAL ────────────────────────────────────── */
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.48); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: #fff; border-radius: 26px; width: 300px;
      max-width: 88vw; text-align: center; overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,.28);
      animation: pop .18s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes pop {
      from { transform: scale(.82); opacity: 0; }
      to   { transform: scale(1);  opacity: 1; }
    }
    .modal-pad { padding: 28px 24px 22px; }
    .modal-icon  { font-size: 44px; margin-bottom: 14px; }
    .modal-title { font-size: 19px; font-weight: 700; color: #111; margin-bottom: 8px; }
    .modal-text  { font-size: 14px; color: #555; line-height: 1.65; margin-bottom: 20px; }

    /* Add-friend tabs */
    .m-tabs { display: flex; border-bottom: 2px solid #f0f0f0; }
    .m-tab {
      flex: 1; padding: 14px; border: none; background: none;
      font-size: 14px; font-weight: 600; color: #aaa; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .15s;
    }
    .m-tab.active { color: #4CAF50; border-bottom-color: #4CAF50; }
    .m-tab-body { display: none; padding: 18px 20px 14px; }
    .m-tab-body.active { display: block; }

    .code-box {
      background: #f8f8f8; border-radius: 12px;
      padding: 14px; margin-bottom: 14px;
    }
    .code-lbl { font-size: 11px; color: #bbb; margin-bottom: 4px; }
    .code-val { font-size: 22px; font-weight: 700; color: #333; letter-spacing: 2px; }

    .m-input {
      width: 100%; border: 2px solid #e5e5e5; border-radius: 13px;
      padding: 12px 15px; font-size: 15px; margin-bottom: 12px;
      outline: none; text-align: center; letter-spacing: 1px;
      transition: border-color .18s;
    }
    .m-input:focus { border-color: #4CAF50; }

    .btn-row { display: flex; gap: 8px; justify-content: center; }
    .m-btn {
      background: #4CAF50; color: #fff; border: none;
      border-radius: 14px; padding: 12px 22px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background .15s; width: 100%;
    }
    .m-btn:hover { background: #43a047; }
    .m-btn.ghost { background: #f2f2f2; color: #555; }
    .m-btn.ghost:hover { background: #e5e5e5; }
    .m-btn.sm { width: auto; padding: 10px 16px; }
    .m-btn.full-ghost { width: 100%; }

    .success-box {
      background: #f0fdf4; border: 1px solid #a5d6a7; border-radius: 12px;
      padding: 14px; font-size: 13px; color: #2e7d32;
      margin-bottom: 12px; line-height: 1.5;
    }
    .hint-text { margin-top: 18px; font-size: 13px; color: #a07850; opacity: .8; }
  </style>
</head>
<body>

<!-- VERSION TABS -->
<div class="ver-tabs">
  <button class="ver-tab active" id="tab-b" onclick="setMode('b')">B형 — 슬라이드 패널</button>
  <button class="ver-tab"        id="tab-c" onclick="setMode('c')">C형 — 풀스크린 전환</button>
</div>
<p class="ver-desc" id="ver-desc">👆 👥 아이콘을 누르면 패널이 오른쪽에서 밀려 나와요</p>

<!-- PHONE FRAME -->
<div class="phone-wrap">

    ? '👆 👥 아이콘을 누르면 패널이 오른쪽에서 밀려 나와요'
    : '👆 👥 아이콘을 누르면 화면 전체가 전환돼요';
  closeFriendPanel();
  closeFriendScreen();
}

// ── ROUTE ──────────────────────────────────────────────────────
function openFriend() {
  if (currentMode === 'b') openFriendPanel();
  else openFriendScreen();
}

// ── B: SLIDE PANEL ─────────────────────────────────────────────
function openFriendPanel() {
  renderFriendList('panel-content');
  document.getElementById('friend-panel').classList.add('open');
  document.getElementById('panel-backdrop').classList.add('open');
}
function closeFriendPanel() {
  document.getElementById('friend-panel').classList.remove('open');
  document.getElementById('panel-backdrop').classList.remove('open');
}

// ── C: FULL SCREEN ─────────────────────────────────────────────
function openFriendScreen() {
  renderFriendList('fs-content');
  document.getElementById('friend-screen').classList.add('open');
}
function closeFriendScreen() {
  document.getElementById('friend-screen').classList.remove('open');
}

// ── RENDER FRIEND LIST ─────────────────────────────────────────
function renderFriendList(cid) {
  let h = '';

  if (pendingIn.length) {
    h += '<div class="section-label">💌 받은 요청 (' + pendingIn.length + ')</div>';
    pendingIn.forEach((r, i) => {
      h += '<div class="request-item">'
         + '  <div class="req-avatar">🐾</div>'
         + '  <div class="req-info">'
         + '    <div class="req-name">' + r.name + '</div>'
         + '    <div class="req-code">' + r.code + '</div>'
         + '  </div>'
         + '  <button class="req-btn accept" onclick="acceptRequest(\'' + cid + '\',' + i + ')">수락</button>'
         + '  <button class="req-btn reject" onclick="rejectRequest(\'' + cid + '\',' + i + ')">거절</button>'
         + '</div>';
    });
  }

  if (receivedCheers.length) {
    const unheartedCount = receivedCheers.filter(c => !c.hearted).length;
    h += '<div class="section-label">💌 받은 응원' + (unheartedCount ? ' (' + unheartedCount + ')' : '') + '</div>';
    const sorted = [...receivedCheers.map((c,i) => ({...c, idx: i}))].sort((a,b) => a.hearted - b.hearted);
    sorted.forEach(c => {
      h += '<div class="my-cheer-item' + (c.hearted ? ' my-cheer-done' : '') + '">'
         + '  <div class="my-cheer-top">'
         + '    <div class="friend-avatar">' + c.emoji + '</div>'
         + '    <div class="my-cheer-info">'
         + '      <div class="my-cheer-name">' + c.name + '</div>'
         + '      <div class="my-cheer-sub">' + (c.hearted ? '❤️ 답장했어요' : '나에게 응원을 보냈어요') + '</div>'
         + '    </div>'
         + (c.hearted
             ? '<button class="heart-btn hearted-static" disabled>♥</button>'
             : '<button class="heart-btn" id="heart-btn-' + c.idx + '" onclick="heartCheer(\'' + cid + '\',' + c.idx + ')">♥</button>')
         + '  </div>'
         + '  <div class="my-cheer-msg">"' + c.msg + '"</div>'
         + '</div>';
    });
  }

  h += '<div class="section-label">친구 ' + friends.length + '명</div>';
  if (!friends.length) {
    h += '<div style="padding:20px;text-align:center;color:#ccc;font-size:12px;">아직 친구가 없어요<br>코드로 추가해봐요!</div>';
  } else {
    friends.forEach((f, i) => {
      if (f.drinkAlert) {
        h += '<div class="cheer-item">'
           + '  <div class="friend-avatar">' + f.emoji + '</div>'
           + '  <div class="cheer-info">'
           + '    <div class="cheer-name">' + f.name + '</div>'
           + '    <div class="cheer-sub">' + f.dog + '이가 ' + (f.drinkAlert === 'yesterday' ? '어제' : '오늘') + ' 한 잔 했대요</div>'
           + '  </div>'
           + (f.cheered
               ? '<span class="' + (f.heartedBack ? 'heart-back' : 'heart-waiting') + '">' + (f.heartedBack ? '❤️' : '···') + '</span>'
               : '<button class="cheer-btn" onclick="openCheer(\'' + cid + '\',' + i + ')">응원하기</button>')
           + '</div>';
      } else if (f.drinkRecord === 'clean') {
        h += '<div class="friend-item">'
           + '  <div class="friend-avatar">' + f.emoji + '</div>'
           + '  <div class="friend-info">'
           + '    <div class="friend-name">' + f.name + '</div>'
           + '    <div class="friend-detail">' + f.dog + '이 · 오늘 술 안 마셨어요 🌿</div>'
           + '  </div>'
           + (f.cheered
               ? '<span class="' + (f.heartedBack ? 'heart-back' : 'heart-waiting') + '">' + (f.heartedBack ? '❤️' : '···') + '</span>'
               : '<button class="praise-btn" onclick="openCheer(\'' + cid + '\',' + i + ',\'clean\')">칭찬하기</button>')
           + '</div>';
      } else {
        h += '<div class="friend-item">'
           + '  <div class="friend-avatar">' + f.emoji + '</div>'
           + '  <div class="friend-info">'
           + '    <div class="friend-name">' + f.name + '</div>'
           + '    <div class="friend-detail">' + f.dog + '이 · LV.' + f.level + '</div>'
           + '  </div>'
           + (f.nudged
               ? '<span class="nudge-sent">알림 보냄 ✓</span>'
               : '<button class="nudge-btn" onclick="sendNudge(\'' + cid + '\',' + i + ')">콕 찌르기</button>')
           + '</div>';
      }
    });
  }

  document.getElementById(cid).innerHTML = h;
}

// ── REQUEST ACTIONS ────────────────────────────────────────────
function acceptRequest(cid, i) {
  const r = pendingIn[i];
  friends.unshift({ name: r.name, dog: '몽실이', level: 1, emoji: '🐾' });
  pendingIn.splice(i, 1);
  renderFriendList(cid);
  updateNotifDot();
}
function rejectRequest(cid, i) {
  pendingIn.splice(i, 1);
  renderFriendList(cid);
  updateNotifDot();
}

// ── ADD FRIEND MODAL ───────────────────────────────────────────
let addTab = 'mycode';

function openAddFriend() {
  addTab = 'mycode';
  showAddFriendModal();
  document.getElementById('modal-bg').classList.add('open');
}

function showAddFriendModal() {
  document.getElementById('modal-content').innerHTML =
    '<div class="m-tabs">' +
    '  <button class="m-tab ' + (addTab==='mycode'?'active':'') + '" onclick="switchAddTab(\'mycode\')">내 코드</button>' +
    '  <button class="m-tab ' + (addTab==='enter'?'active':'') + '" onclick="switchAddTab(\'enter\')">코드 입력</button>' +
    '</div>' +
    '<div class="m-tab-body ' + (addTab==='mycode'?'active':'') + '" id="tab-mycode">' +
    '  <div class="code-box">' +
    '    <div class="code-lbl">내 친구 코드</div>' +
    '    <div class="code-val">' + ME.code + '</div>' +
    '  </div>' +
    '  <div class="btn-row" style="margin-bottom:4px;">' +
    '    <button class="m-btn sm ghost" id="copy-btn" onclick="copyCode()">📋 복사</button>' +
    '    <button class="m-btn sm" onclick="shareCode()">📤 공유</button>' +
    '  </div>' +
    '</div>' +
    '<div class="m-tab-body ' + (addTab==='enter'?'active':'') + '" id="tab-enter">' +
    '  <div id="enter-inner">' +
    '    <input class="m-input" id="code-input" placeholder="MUNG-______" maxlength="10"' +
    '           oninput="this.value=this.value.toUpperCase()"' +
    '           onkeydown="if(event.key===\'Enter\')sendRequest()">' +
    '    <button class="m-btn" onclick="sendRequest()">친구 요청 보내기</button>' +
    '  </div>' +
    '</div>' +
    '<div style="padding:8px 20px 18px;">' +
    '  <button class="m-btn ghost full-ghost" onclick="closeModal()">닫기</button>' +
    '</div>';
  if (addTab === 'enter') setTimeout(() => document.getElementById('code-input')?.focus(), 60);
}

function switchAddTab(t) { addTab = t; showAddFriendModal(); }

function copyCode() {
  navigator.clipboard?.writeText(ME.code).catch(() => {});
  const b = document.getElementById('copy-btn');
  if (b) { b.textContent = '✅ 복사됨'; setTimeout(() => b.textContent = '📋 복사', 1600); }
}
function shareCode() {
  if (navigator.share) navigator.share({ title: '멍 친구 추가', text: '내 코드: ' + ME.code }).catch(() => {});
  else copyCode();
}
function sendRequest() {
  const v = document.getElementById('code-input')?.value.trim();
  if (!v || v.length < 4) return;
  document.getElementById('enter-inner').innerHTML =
    '<div class="success-box">🐾 요청을 보냈어요!<br>상대방이 수락하면 친구가 돼요.</div>';
}

// ── ORIGINAL MODALS ────────────────────────────────────────────
const TALKS = [
  "오늘 하루도 수고했어! 나 항상 여기 있을게 🐾",
  "배고파... 밥 줘... 제발... 🥺",
  "주인아, 오늘 뭐 했어? 나한테 다 말해줘도 돼!",
  "사실 나 오늘 소파에서 낮잠 잤어. 비밀이야 🤫",
  "같이 산책 가고 싶다... 언제 데려가 줄 거야? 🌿",
  "나 보고 싶었지? 솔직히 말해! 🐶",
];
const NAME_SETS = [
  ["몽글이","뭉치","코코"], ["두부","마시멜로","솜사탕"],
  ["구름이","눈송이","흰둥이"], ["보리","땅콩","쿠키"],
];
let nameIdx = 0;
let _cheerTarget = -1, _cheerCid = '', _cheerMsg = '', _cheerType = 'drink';

function buildModal(type, extra) {
  const chips = NAME_SETS[nameIdx % NAME_SETS.length]
    .map(n => '<div style="background:#f0fdf4;border:2px solid #4CAF50;color:#2e7d32;border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;">' + n + '</div>').join('');
  switch(type) {
    case 'name': return '<div class="modal-pad"><div class="modal-icon">🐾</div><div class="modal-title">강아지 이름 추천</div><div class="modal-text">이 중에서 마음에 드는 이름 골라봐!</div><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;">' + chips + '</div><div class="btn-row"><button class="m-btn sm ghost" onclick="nameIdx++;openModal(\'name\')">다른 이름 🔄</button><button class="m-btn sm" onclick="closeModal()">닫기</button></div></div>';
    case 'myname': return '<div class="modal-pad"><div class="modal-icon">👤</div><div class="modal-title">내 이름 알려주기</div><div class="modal-text">이름이 뭐야? 알려줘!</div><input class="m-input" id="name-input" placeholder="이름 입력..." maxlength="10" onkeydown="if(event.key===\'Enter\')submitName()"><div class="btn-row"><button class="m-btn sm ghost" onclick="closeModal()">취소</button><button class="m-btn sm" onclick="submitName()">알려줘!</button></div></div>';
    case 'myname-done': return '<div class="modal-pad"><div class="modal-icon">🐶</div><div class="modal-title">안녕, ' + extra + '아!</div><div class="modal-text">반가워! 앞으로 잘 부탁해 🎉</div><button class="m-btn" onclick="closeModal()">나도 반가워!</button></div>';
    case 'talk': return '<div class="modal-pad"><div class="modal-icon">💬</div><div class="modal-title">강아지 한마디</div><div class="modal-text">"' + TALKS[Math.floor(Math.random()*TALKS.length)] + '"</div><button class="m-btn" onclick="closeModal()">고마워 🐶</button></div>';
    case 'drink': return '<div class="modal-pad"><div class="modal-icon">🍺</div><div class="modal-title">음주 기록</div><div class="modal-text">오늘 마셨어? 솔직하게!</div><div class="btn-row"><button class="m-btn sm ghost" onclick="drinkLog(false)">안 마셨어 😇</button><button class="m-btn sm" onclick="drinkLog(true)">마셨어 🍻</button></div></div>';
    case 'drink-done': return '<div class="modal-pad"><div class="modal-icon">' + (extra?'🍻':'✨') + '</div><div class="modal-title">' + (extra?'기록 완료!':'잘했어!') + '</div><div class="modal-text">' + (extra?'오늘 한 잔 했구나!<br>기록해뒀어. 많이 마시진 마 🐾<br><br>친구들에게 알림이 갔어요 💌':'오늘 절주 성공!<br>대단해, 칭찬해줄게 🎉') + '</div><button class="m-btn" onclick="closeModal()">고마워!</button></div>';
    case 'cheer': {
      const f = friends[extra];
      const isDrink = _cheerType === 'drink';
      const msgs = isDrink
        ? ['오늘만! 내일부턴 절주해 💪','같이 힘내자 🐾','괜찮아~ 한 번은 실수야 ☺️','물 많이 마셔! 속 안 아프게 🥤']
        : ['오늘 술 안 마신 거 대단해 🌿','역시 최고야 👏','연속 도전 응원해 💪','멋있다 진짜 🎉'];
      const title = isDrink ? f.name + '에게 응원 보내기' : f.name + '에게 칭찬 보내기';
      const desc = isDrink
        ? f.dog + '이가 ' + (f.drinkAlert === 'yesterday' ? '어제' : '오늘') + ' 한 잔 했대요<br>응원의 한마디를 골라봐요!'
        : f.dog + '이가 오늘 술 안 마셨대요<br>칭찬 한마디를 골라봐요!';
      const chips = msgs.map(m => '<button class="cheer-chip" data-msg="' + m + '" onclick="selectCheer(this)">' + m + '</button>').join('');
      return '<div class="modal-pad"><div class="modal-icon">💌</div><div class="modal-title">' + title + '</div><div class="modal-text">' + desc + '</div><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px;">' + chips + '</div><input class="m-input" id="cheer-custom" placeholder="직접 입력..." maxlength="40" oninput="typeCheer(this)"><div class="btn-row"><button class="m-btn sm ghost" onclick="closeModal()">취소</button><button class="m-btn sm" id="cheer-send-btn" disabled onclick="sendCheer()">보내기</button></div></div>';
    }
    case 'cheer-done': return '<div class="modal-pad"><div class="modal-icon">🎉</div><div class="modal-title">응원을 보냈어요!</div><div class="modal-text">' + extra + '이 힘을 얻었을 거예요 🐾</div><button class="m-btn" onclick="closeCheerDone()">닫기</button></div>';
    case 'edit-dogname': return '<div class="modal-pad"><div class="modal-icon">🐾</div><div class="modal-title">강아지 이름 변경</div><input class="m-input" id="edit-input" value="' + dogName + '" maxlength="10" onkeydown="if(event.key===\'Enter\')saveDogName()"><div class="btn-row"><button class="m-btn sm ghost" onclick="closeModal()">취소</button><button class="m-btn sm" onclick="saveDogName()">저장</button></div></div>';
    case 'edit-myname': return '<div class="modal-pad"><div class="modal-icon">👤</div><div class="modal-title">내 이름 변경</div><input class="m-input" id="edit-input" value="' + ME.name + '" maxlength="10" onkeydown="if(event.key===\'Enter\')saveMyName()"><div class="btn-row"><button class="m-btn sm ghost" onclick="closeModal()">취소</button><button class="m-btn sm" onclick="saveMyName()">저장</button></div></div>';
  }
}

function openModal(type, extra) {
  document.getElementById('modal-content').innerHTML = buildModal(type, extra);
  document.getElementById('modal-bg').classList.add('open');
  if (type === 'myname') setTimeout(() => document.getElementById('name-input')?.focus(), 60);
  if (type === 'edit-dogname' || type === 'edit-myname') setTimeout(() => { const el = document.getElementById('edit-input'); if(el){el.focus();el.select();} }, 60);
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
function bgClose(e) { if (e.target.id === 'modal-bg') closeModal(); }
function submitName() {
  const v = document.getElementById('name-input')?.value.trim();
  if (v) openModal('myname-done', v);
}
function renderSettingScreen() {
  document.getElementById('setting-list').innerHTML =
    '<div class="setting-item editable" onclick="openModal(\'edit-dogname\')">' +
      '<span>강아지 이름</span><span class="setting-item-value">' + dogName + ' ›</span>' +
    '</div>' +
    '<div class="setting-item editable" onclick="openModal(\'edit-myname\')">' +
      '<span>내 이름</span><span class="setting-item-value">' + ME.name + ' ›</span>' +
    '</div>' +
    '<div class="setting-item">이용약관</div>' +
    '<div class="setting-item">개인정보 처리방침</div>' +
    '<div class="setting-item">탈퇴하기</div>' +
    '<div class="setting-item">로그아웃</div>' +
    '<div class="setting-item"><span>앱 버전</span><span class="setting-item-value">1.0.6</span></div>';
}
function openSettingScreen() {
  renderSettingScreen();
  document.getElementById('setting-screen').classList.add('open');
}
function closeSettingScreen() {
  document.getElementById('setting-screen').classList.remove('open');
}

function drinkLog(d) { openModal('drink-done', d); }

function saveDogName() {
  const v = document.getElementById('edit-input')?.value.trim();
  if (v) { dogName = v; closeModal(); renderSettingScreen(); }
}
function saveMyName() {
  const v = document.getElementById('edit-input')?.value.trim();
  if (v) { ME.name = v; closeModal(); renderSettingScreen(); }
}

function openCheer(cid, i, type) {
  _cheerTarget = i; _cheerCid = cid; _cheerMsg = ''; _cheerType = type || 'drink';
  openModal('cheer', i);
}
function sendNudge(cid, i) {
  friends[i].nudged = true;
  renderFriendList(cid);
}
function selectCheer(el) {
  document.querySelectorAll('.cheer-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  _cheerMsg = el.dataset.msg;
  const inp = document.getElementById('cheer-custom');
  if (inp) inp.value = '';
  document.getElementById('cheer-send-btn').disabled = false;
}
function typeCheer(el) {
  document.querySelectorAll('.cheer-chip').forEach(c => c.classList.remove('selected'));
  _cheerMsg = el.value.trim();
  document.getElementById('cheer-send-btn').disabled = !_cheerMsg;
}
function sendCheer() {
  if (!_cheerMsg) return;
  friends[_cheerTarget].cheered = true;
  friends[_cheerTarget].heartedBack = false;
  const name = friends[_cheerTarget].name;
  _cheerMsg = '';
  openModal('cheer-done', name);
}
function closeCheerDone() {
  closeModal();
  updateNotifDot();
  if (_cheerCid) renderFriendList(_cheerCid);
}
function heartCheer(cid, i) {
  receivedCheers[i].hearted = true;
  const btn = document.getElementById('heart-btn-' + i);
  if (btn) { btn.classList.add('hearted'); btn.disabled = true; }
  updateNotifDot();
  setTimeout(() => renderFriendList(cid), 380);
}
function updateNotifDot() {
  const has = pendingIn.length > 0
    || friends.some(f => f.drinkAlert && !f.cheered)
    || receivedCheers.some(c => !c.hearted);
  document.getElementById('notif-dot')?.classList.toggle('active', has);
}
updateNotifDot();
</script>
